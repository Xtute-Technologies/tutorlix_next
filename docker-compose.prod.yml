services:
  backend:
    build: ./backend
    container_name: backend-prod-config
    ports:
      - "8001:8001"
    command: gunicorn tutorlix.wsgi:application --bind 0.0.0.0:8001

  frontend:
    build: ./frontend
    container_name: frontend-prod-config
    ports:
      - "3001:3001"
    command: npm run start
    environment:
      - NEXT_PUBLIC_API_URL=/api   # 🔥 FIX
    depends_on:
      - backend-prod