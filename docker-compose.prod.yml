services:
  backend:
    build: ./backend
    container_name: backend-prod
    ports:
      - "8000:8000"
    command: gunicorn tutorlix.wsgi:application --bind 0.0.0.0:8000

  frontend:
    build: ./frontend
    container_name: frontend-prod
    ports:
      - "3000:3000"
    command: npm run start
    environment:
      - NEXT_PUBLIC_API_URL=https://tutorlix.com/api   # 🔥 FIX
    depends_on:
      - backend-prod