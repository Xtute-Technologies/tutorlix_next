services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8000:8000"
    command: gunicorn tutorlix.wsgi:application --bind 0.0.0.0:8000

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    command: npm run start
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend