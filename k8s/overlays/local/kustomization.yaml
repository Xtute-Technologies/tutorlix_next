resources:
  - ../../base

configMapGenerator:
  - name: frontend-config
    literals:
      - NEXT_PUBLIC_API_URL=https://dev.tutorlix.com/api

generatorOptions:
  disableNameSuffixHash: true

patches:
  - target:
      kind: Deployment
      name: backend
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never

  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Never