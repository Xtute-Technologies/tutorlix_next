apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-prod
  template:
    metadata:
      labels:
        app: backend-prod
    spec:
      containers:
        - name: backend-prod
          image: ankitvashishta7/tutorlix-backend-prod:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001

---
apiVersion: v1
kind: Service
metadata:
  name: backend-prod
spec:
  type: NodePort
  selector:
    app: backend-prod
  ports:
    - port: 8001
      targetPort: 8001
      nodePort: 31235

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-prod
  template:
    metadata:
      labels:
        app: frontend-prod
    spec:
      containers:
        - name: frontend-prod
          image: ankitvashishta7/tutorlix-frontend-prod:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: frontend-prod-config

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-prod
spec:
  type: NodePort
  selector:
    app: frontend-prod
  ports:
    - port: 3001
      targetPort: 3001
      nodePort: 31568