apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-prod
  template:
    metadata:
      labels:
        app: backend-prod
    spec:
      containers:
        - name: backend-prod
          image: ankitvashishta7/tutorlix-backend-prod:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          volumeMounts:
            - name: db-storage
              mountPath: /app/db.sqlite3
              subPath: db.sqlite3

      volumes:
        - name: db-storage
          hostPath:
            path: /var/www/tutorlix-prod/backend
            type: Directory

---
apiVersion: v1
kind: Service
metadata:
  name: backend-prod
spec:
  type: NodePort
  selector:
    app: backend-prod
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 31235

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-prod
  template:
    metadata:
      labels:
        app: frontend-prod
    spec:
      containers:
        - name: frontend-prod
          image: ankitvashishta7/tutorlix-frontend-prod:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: frontend-prod-config

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-prod
spec:
  type: NodePort
  selector:
    app: frontend-prod
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 31568